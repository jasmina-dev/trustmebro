name: Access GitHub Secrets

on:
  # Manual trigger from the Actions tab
  workflow_dispatch:

  # Optional: run on pushes to main (you can adjust/remove)
  push:
    branches:
      - main

jobs:
  show-secrets:
    runs-on: ubuntu-latest

    # Example: expose secrets as environment variables for all steps in this job
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Example 1: using job-level env (secrets already mapped above)
      - name: Use secrets from job env
        run: |
          if [ -n "${ANTHROPIC_API_KEY}" ]; then
            echo "ANTHROPIC_API_KEY is set"
          else
            echo "ANTHROPIC_API_KEY is NOT set"
          fi

      # Example 2: pass secrets only to a single step
      - name: Use secrets only in this step
        run: |
          # Example of passing secrets into a script/command
          python - << 'PYCODE'
          import os

          anthropic_key = os.environ.get("ANTHROPIC_API_KEY")
          if anthropic_key:
              print("ANTHROPIC_API_KEY available to Python (value is masked in logs).")
          PYCODE
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
